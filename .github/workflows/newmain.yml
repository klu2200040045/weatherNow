                p = f = s = 0
                for t in root.findall(".//test"):
                    st = (t.find("status").get("status", "") or "").upper()
                    if st == "PASS": p += 1
                    elif st == "FAIL": f += 1
                    elif st == "SKIP": s += 1
                
                print(f"{p} {f} {s}")
                PY
      
                # Strip CR and read
                read PASSED FAILED SKIPPED < <(tr -d '\r' < counts.txt)
      
                # Ensure numeric-only (extra safety)
                PASSED=${PASSED//[^0-9]/}
                FAILED=${FAILED//[^0-9]/}
                SKIPPED=${SKIPPED//[^0-9]/}
                
                # # Read counts and emit annotation
                # read PASSED FAILED SKIPPED < counts.txt
                
                TOTAL=$((PASSED+FAILED+SKIPPED))
                SEV="notice"; [ "$FAILED" -gt 0 ] && SEV="error"
                echo "::${SEV} title=Reference Robot Test Batch2  Totals::Total ${TOTAL} | ✅ Passed: ${PASSED} | ❌ Failed: ${FAILED} | ⚠️ Skipped: ${SKIPPED}"

            - name: Upload Reports folder as artifact
              uses: actions/upload-artifact@v4
              with:
                name: Reference-Project-Batch2-Reports
                path: ${{ env.WORKSPACE }}\TestSuiteReport

    Run_NDCe_Builder_Updates_Batch1:
        runs-on: ndce-automation-runners
        needs: Run_Tests_Batch2
        env:
            WORKSPACE: ${{ github.workspace }}
            TestCaseDirs: ${{ github.event.inputs.BuilderUpdates_TestCaseDirs }}
            AZURE_IP_ADDRESS: ${{ github.event.inputs.Azure_IP_Address || '153.81.237.136' }}
            BUILDER_UPDATES_CLONE_BRANCH: ${{ github.event.inputs.BuilderUpdates_Clone_Branch || 'master' }}
            BUILDER_UPDATES_RUNBATFILE: ${{ github.event.inputs.BuilderUpdates_RunBatFile || 'CallAntScript.bat' }}
            BUILDER_UPDATES_TESTSUITE: ${{ github.event.inputs.BuilderUpdates_TestSuiteName || 'Execute_TestSuite' }}

        steps:

            - name: sleep 5 min before execution
              run: sleep 300

            - name: Set TestCaseDirs for push events
              run: |
                $TestCaseDirs = "$env:TestCaseDirs"
                # Set default TestCaseDirs if not provided (for push events)
                if ([string]::IsNullOrEmpty($TestCaseDirs)) {
                  $defaultDir = "Functional\Builder Updates\Logical Components\Balance.robot,
                                 Functional\Builder Updates\Logical Components\BalancewithDispense.robot,
                                 Functional\Builder Updates\Logical Components\CashDepositTransaction.robot,
                                 Functional\Builder Updates\Logical Components\CashWithdrawal.robot,
                                 Functional\Builder Updates\Logical Components\Non-CashTransaction.robot,
                                 Functional\Builder Updates\Logical Components\PinEntry.robot,
                                 Functional\Builder Updates\Logical Components\RetainSuspectCounterfiet.robot"
                  Add-Content -Path $env:GITHUB_ENV -Value "TestCaseDirs<<EOF"
                  Add-Content -Path $env:GITHUB_ENV -Value $defaultDir
                  Add-Content -Path $env:GITHUB_ENV -Value "EOF"
                  echo "${{ env.TestCaseDirs }}"
                } else {
                  echo "TestCaseDirs=$TestCaseDirs"  >> $env:GITHUB_ENV
                }
            
            - name: Parse the TestcaseDirs (save as multiline env)
              shell: pwsh
              run: |
                # Convert comma-separated list into newline-separated list
                $testCaseDirs = "${{ env.TestCaseDirs }}" -split '\s*,\s*' -join "`n"
                # Save MULTILINE value into GITHUB_ENV (this is the supported format)
                "TestCaseDirs<<EOF" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
                $testCaseDirs       | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
                "EOF"               | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            - name: Print TestCaseDirs
              run: |
                echo "=== TestCaseDirs Environment Variable Content ==="
                echo "${{ env.TestCaseDirs }}"
            - name: Print IP Address
              run: |
                echo "Azure IP Address: ${{ env.AZURE_IP_ADDRESS }}"
            - name: Checkout Repository
              uses: actions/checkout@v4
              with:
                ref: ${{ env.BUILDER_UPDATES_CLONE_BRANCH }}
      
            - name: Print Workspace
              run: |
                echo "Workspace: ${{ github.workspace }}"
            - name: Set BASEDIR for Ant
              shell: pwsh
              run: |
                "BASEDIR=${{ env.WORKSPACE}}" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            - name: Run Reference Test Suite
              shell: cmd
              run: |
                cd  /d "%BASEDIR%\Configuration\Build-Scripts"
                .\"${{ env.BUILDER_UPDATES_RUNBATFILE }}" ""${{ env.BUILDER_UPDATES_TESTSUITE }}"" ""${{ env.AZURE_IP_ADDRESS }}"" "NDCeHost" "False"
            - name: Post counts as annotation
              shell: bash
              run: |
                # Inline Python to parse counts
                python - << PY > counts.txt
                import xml.etree.ElementTree as ET
                import os
                
                xml_path = os.path.join(os.environ.get("WORKSPACE", ""), "TestSuiteReport/output.xml")
                root = ET.parse(xml_path).getroot()
                
                p = f = s = 0
                for t in root.findall(".//test"):
                    st = (t.find("status").get("status", "") or "").upper()
                    if st == "PASS": p += 1
                    elif st == "FAIL": f += 1
                    elif st == "SKIP": s += 1
                
                print(f"{p} {f} {s}")
                PY
      
                # Strip CR and read
                read PASSED FAILED SKIPPED < <(tr -d '\r' < counts.txt)
      
                # Ensure numeric-only (extra safety)
                PASSED=${PASSED//[^0-9]/}
                FAILED=${FAILED//[^0-9]/}
                SKIPPED=${SKIPPED//[^0-9]/}
                
                # # Read counts and emit annotation
                # read PASSED FAILED SKIPPED < counts.txt
                
                TOTAL=$((PASSED+FAILED+SKIPPED))
                SEV="notice"; [ "$FAILED" -gt 0 ] && SEV="error"
                echo "::${SEV} title=NDCe BuilderUpdates_Batch1 Robot Test Totals::Total ${TOTAL} | ✅ Passed: ${PASSED} | ❌ Failed: ${FAILED} | ⚠️ Skipped: ${SKIPPED}"

            - name: Upload Reports folder as artifact
              uses: actions/upload-artifact@v4
              with:
                name: NDCe_BuilderUpdates_Batch1-Reports
                path: ${{ env.WORKSPACE }}\TestSuiteReport

